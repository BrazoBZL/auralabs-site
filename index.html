<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Labs | Research-Grade Peptides</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #17191c;
      overflow-x: hidden;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
    }

    .wrapper {
      position: relative;
      z-index: 1;
    }

    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 500;
      color: #17191c;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .nav-links a {
      color: #777b86;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #2563eb;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.7);
    }

    .hero-text h1 {
      font-family: 'EB Garamond', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 20px;
      color: #17191c;
      letter-spacing: -0.02em;
    }

    .hero-text p {
      font-size: 18px;
      color: #4c4c4c;
      max-width: 700px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
    }

    .btn-secondary {
      background: white;
      color: #2563eb;
      border: 1px solid #2563eb;
    }

    .btn-secondary:hover {
      background: #f0f9ff;
    }

    section {
      padding: 96px 40px;
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.85);
    }

    section h2 {
      font-family: 'EB Garamond', serif;
      font-size: 56px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 60px;
      color: #17191c;
    }

    .compounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .compound {
      background: #f7f7f8;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      transition: all 0.3s;
    }

    .compound:hover {
      background: white;
      box-shadow: 0 4px 16px rgba(23, 25, 28, 0.08);
      transform: translateY(-4px);
    }

    .compound-name {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #17191c;
    }

    .compound-info {
      font-size: 13px;
      color: #777b86;
      margin-bottom: 4px;
    }

    .compound-purity {
      font-size: 13px;
      color: #2563eb;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .compound-btn {
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .compound-btn:hover {
      background: #1d4ed8;
    }

    footer {
      background: rgba(247, 247, 248, 0.9);
      padding: 40px;
      text-align: center;
      font-size: 13px;
      color: #777b86;
      border-top: 1px solid #e5e5e5;
    }

    @media (max-width: 768px) {
      nav { padding: 15px 20px; }
      .nav-links { gap: 15px; }
      .hero-text h1 { font-size: 40px; }
      section { padding: 60px 20px; }
      .compounds-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="wrapper">
  <nav>
    <div class="logo">Aura Labs</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#compounds">Compounds</a></li>
      <li><a href="#">Account</a></li>
    </ul>
    <button class="btn-primary" onclick="alert('Cart: ' + cartCount)">Cart (0)</button>
  </nav>

  <section class="hero" id="home">
    <div class="hero-text">
      <h1>We offer what we're certain of.</h1>
      <p>Research-grade peptides with verified purity, documented sourcing, and transparent testing. Nothing more.</p>
      <div class="hero-buttons">
        <button class="btn-primary" onclick="scrollTo('#compounds')">View Compounds</button>
        <button class="btn-secondary" onclick="alert('Learn more')">Learn More</button>
      </div>
    </div>
  </section>

  <section id="compounds">
    <h2>Our Selection</h2>
    <div class="compounds-grid" id="grid"></div>
  </section>

  <footer>
    <p>&copy; 2026 Aura Labs. <a href="#" style="color: #2563eb;">Documentation</a> | <a href="#" style="color: #2563eb;">Contact</a></p>
  </footer>
</div>

<script>
  const compounds = [
    { name: 'Semaglutide', dose: '5mg', purity: '98.5%' },
    { name: 'Tirzepatide', dose: '10mg', purity: '99.2%' },
    { name: 'CJC-1295', dose: '2mg', purity: '98.8%' },
    { name: 'Ipamorelin', dose: '5mg', purity: '99.1%' },
    { name: 'BPC-157', dose: '5mg', purity: '99.2%' },
    { name: 'TB-500', dose: '2mg', purity: '98.7%' },
    { name: 'MK-677', dose: '25mg', purity: '99.4%' },
    { name: 'GHRP-6', dose: '5mg', purity: '98.9%' },
    { name: 'Semax', dose: '500mcg', purity: '99.1%' },
    { name: 'NAD+', dose: '500mg', purity: '99.8%' },
    { name: 'Selank', dose: '5mg', purity: '99.0%' },
    { name: 'Epithalon', dose: '10mg', purity: '98.5%' },
    { name: 'GHK-Cu', dose: '5mg', purity: '99.3%' },
    { name: 'GHRP-2', dose: '5mg', purity: '99.0%' },
    { name: 'Hexarelin', dose: '2mg', purity: '98.6%' },
    { name: 'Sermorelin', dose: '5mg', purity: '99.2%' },
    { name: 'Cerebrolysin', dose: '5ml', purity: '98.8%' },
    { name: 'Noopept', dose: '30mg', purity: '99.5%' },
    { name: 'NSI-189', dose: '40mg', purity: '99.2%' },
    { name: 'Piracetam', dose: '800mg', purity: '99.3%' },
  ];

  let cartCount = 0;

  const grid = document.getElementById('grid');
  compounds.forEach(c => {
    const div = document.createElement('div');
    div.className = 'compound';
    div.innerHTML = `
      <div class="compound-name">${c.name}</div>
      <div class="compound-info">${c.dose}</div>
      <div class="compound-purity">Purity: ${c.purity}</div>
      <button class="compound-btn" onclick="addCart()">Add to Cart</button>
    `;
    grid.appendChild(div);
  });

  function addCart() {
    cartCount++;
    document.querySelectorAll('.btn-primary')[0].textContent = 'Cart (' + cartCount + ')';
  }

  function scrollTo(id) {
    document.querySelector(id).scrollIntoView({ behavior: 'smooth' });
  }

  // ==================== DA VINCI BACKGROUND ====================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // DNA helix variations
  const helixTypes = [
    { type: 'dna', speed: 0.8, scale: 1.0 },
    { type: 'dna', speed: 1.2, scale: 0.8 },
    { type: 'dna', speed: 0.6, scale: 1.2 },
    { type: 'dna', speed: 0.9, scale: 0.9 },
  ];

  class BackgroundElement {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.2;
      this.vy = (Math.random() - 0.5) * 0.2;
      this.life = 1;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.01;
      this.scale = 0.6 + Math.random() * 0.8;
      this.baseHeight = 80 + Math.random() * 120;
      this.type = 'dna';
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.rotation += this.rotationSpeed;
      this.life -= 0.0003;

      // Wrap around
      if (this.x < -100) this.x = canvas.width + 100;
      if (this.x > canvas.width + 100) this.x = -100;
      if (this.y < -100) this.y = canvas.height + 100;
      if (this.y > canvas.height + 100) this.y = -100;
    }

    drawDNA() {
      const height = this.baseHeight;
      const turns = 3;
      
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 2;

      // Left strand
      ctx.beginPath();
      for (let i = 0; i <= 100; i++) {
        const progress = i / 100;
        const angle = progress * Math.PI * 2 * turns;
        const x = Math.cos(angle) * 15 * this.scale;
        const y = progress * height - height * 0.5;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Right strand
      ctx.beginPath();
      for (let i = 0; i <= 100; i++) {
        const progress = i / 100;
        const angle = progress * Math.PI * 2 * turns + Math.PI;
        const x = Math.cos(angle) * 15 * this.scale;
        const y = progress * height - height * 0.5;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Base pairs
      ctx.lineWidth = 1;
      for (let i = 0; i <= 100; i += 5) {
        const progress = i / 100;
        const angle = progress * Math.PI * 2 * turns;
        const x1 = Math.cos(angle) * 15 * this.scale;
        const y = progress * height - height * 0.5;
        const angle2 = angle + Math.PI;
        const x2 = Math.cos(angle2) * 15 * this.scale;
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
      }
    }

    drawCircle() {
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, this.baseHeight * 0.4, 0, Math.PI * 2);
      ctx.stroke();
    }

    drawHelix() {
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 80; i++) {
        const angle = (i / 80) * Math.PI * 6;
        const radius = (i / 80) * this.baseHeight * 0.3;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius - this.baseHeight * 0.15;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    drawSpiral() {
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 100; i++) {
        const angle = (i / 100) * Math.PI * 8;
        const radius = (i / 100) * this.baseHeight * 0.4;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.life * 0.5;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.scale(this.scale, this.scale);

      if (this.type === 'dna') {
        this.drawDNA();
      } else if (this.type === 'circle') {
        this.drawCircle();
      } else if (this.type === 'helix') {
        this.drawHelix();
      } else if (this.type === 'spiral') {
        this.drawSpiral();
      }

      ctx.restore();
    }
  }

  let elements = [];
  function initElements() {
    elements = [];
    // Mix of DNA strands and other structures
    for (let i = 0; i < 20; i++) {
      elements.push(new DNAStrand());
    }
    // Add other geometric shapes
    for (let i = 0; i < 15; i++) {
      const rand = Math.random();
      if (rand < 0.33) {
        elements.push(createCircle());
      } else if (rand < 0.66) {
        elements.push(createHelix());
      } else {
        elements.push(createSpiral());
      }
    }
  }

  function createCircle() {
    const el = new BackgroundElement();
    el.type = 'circle';
    return el;
  }

  function createHelix() {
    const el = new BackgroundElement();
    el.type = 'helix';
    return el;
  }

  function createSpiral() {
    const el = new BackgroundElement();
    el.type = 'spiral';
    return el;
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    elements.forEach((el, i) => {
      el.update();
      el.draw();

      // Regenerate old elements
      if (el.life < 0) {
        elements[i] = new BackgroundElement();
      }
    });

    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  initElements();
  animate();
</script>

</body>
</html>
