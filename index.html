<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Labs | Research-Grade Peptides</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #17191c;
      overflow-x: hidden;
    }

    /* Particle Canvas - Fixed Background */
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Content Container */
    .content {
      position: relative;
      z-index: 10;
    }

    /* Navigation */
    nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      font-weight: 500;
      color: #17191c;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .nav-links a {
      color: #777b86;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #2563eb;
    }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero-text h1 {
      font-family: 'EB Garamond', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 20px;
      color: #17191c;
      letter-spacing: -0.02em;
    }

    .hero-text p {
      font-size: 18px;
      color: #4c4c4c;
      max-width: 700px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
    }

    .btn-secondary {
      background: white;
      color: #2563eb;
      border: 1px solid #2563eb;
    }

    .btn-secondary:hover {
      background: #f0f9ff;
    }

    /* Section */
    section {
      padding: 96px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    section h2 {
      font-family: 'EB Garamond', serif;
      font-size: 56px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 60px;
      color: #17191c;
    }

    /* Compounds Grid */
    .compounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .compound {
      background: #f7f7f8;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      transition: all 0.3s;
    }

    .compound:hover {
      background: white;
      box-shadow: 0 4px 16px rgba(23, 25, 28, 0.08);
      transform: translateY(-4px);
    }

    .compound-name {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #17191c;
    }

    .compound-info {
      font-size: 13px;
      color: #777b86;
      margin-bottom: 4px;
    }

    .compound-purity {
      font-size: 13px;
      color: #2563eb;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .compound-btn {
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .compound-btn:hover {
      background: #1d4ed8;
    }

    /* Footer */
    footer {
      background: #f7f7f8;
      padding: 40px;
      text-align: center;
      font-size: 13px;
      color: #777b86;
      border-top: 1px solid #e5e5e5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 15px 20px;
        font-size: 12px;
      }

      .nav-links {
        gap: 15px;
      }

      .hero-text h1 {
        font-size: 40px;
      }

      section {
        padding: 60px 20px;
      }

      .compounds-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>

<!-- CANVAS FOR PARTICLES -->
<canvas id="canvas"></canvas>

<!-- CONTENT -->
<div class="content">
  <nav>
    <div class="logo">Aura Labs</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#compounds">Compounds</a></li>
      <li><a href="#">Account</a></li>
    </ul>
    <button class="btn-primary" onclick="alert('Cart: ' + cartCount)">Cart (0)</button>
  </nav>

  <section class="hero" id="home">
    <div class="hero-text">
      <h1>We offer what we're certain of.</h1>
      <p>Research-grade peptides with verified purity, documented sourcing, and transparent testing. Nothing more.</p>
      <div class="hero-buttons">
        <button class="btn-primary" onclick="scrollTo('#compounds')">View Compounds</button>
        <button class="btn-secondary" onclick="alert('Learn more')">Learn More</button>
      </div>
    </div>
  </section>

  <section id="compounds">
    <h2>Our Selection</h2>
    <div class="compounds-grid" id="grid">
      <!-- Populated by JavaScript -->
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Aura Labs. <a href="#" style="color: #2563eb;">Documentation</a> | <a href="#" style="color: #2563eb;">Contact</a></p>
  </footer>
</div>

<script>
  // Build: 2026-06-09 17:14:00 UTC - Fresh particle system
  // Compound data
  const compounds = [
    { name: 'Semaglutide', dose: '5mg', purity: '98.5%' },
    { name: 'Tirzepatide', dose: '10mg', purity: '99.2%' },
    { name: 'CJC-1295', dose: '2mg', purity: '98.8%' },
    { name: 'Ipamorelin', dose: '5mg', purity: '99.1%' },
    { name: 'BPC-157', dose: '5mg', purity: '99.2%' },
    { name: 'TB-500', dose: '2mg', purity: '98.7%' },
    { name: 'MK-677', dose: '25mg', purity: '99.4%' },
    { name: 'GHRP-6', dose: '5mg', purity: '98.9%' },
    { name: 'Semax', dose: '500mcg', purity: '99.1%' },
    { name: 'NAD+', dose: '500mg', purity: '99.8%' },
    { name: 'Selank', dose: '5mg', purity: '99.0%' },
    { name: 'Epithalon', dose: '10mg', purity: '98.5%' },
    { name: 'GHK-Cu', dose: '5mg', purity: '99.3%' },
    { name: 'GHRP-2', dose: '5mg', purity: '99.0%' },
    { name: 'Hexarelin', dose: '2mg', purity: '98.6%' },
    { name: 'Sermorelin', dose: '5mg', purity: '99.2%' },
    { name: 'Cerebrolysin', dose: '5ml', purity: '98.8%' },
    { name: 'Noopept', dose: '30mg', purity: '99.5%' },
    { name: 'NSI-189', dose: '40mg', purity: '99.2%' },
    { name: 'Piracetam', dose: '800mg', purity: '99.3%' },
  ];

  let cartCount = 0;

  // Render compounds
  const grid = document.getElementById('grid');
  compounds.forEach(c => {
    const div = document.createElement('div');
    div.className = 'compound';
    div.innerHTML = `
      <div class="compound-name">${c.name}</div>
      <div class="compound-info">${c.dose}</div>
      <div class="compound-purity">Purity: ${c.purity}</div>
      <button class="compound-btn" onclick="addCart()">Add to Cart</button>
    `;
    grid.appendChild(div);
  });

  function addCart() {
    cartCount++;
    document.querySelectorAll('.btn-primary')[0].textContent = 'Cart (' + cartCount + ')';
  }

  function scrollTo(id) {
    document.querySelector(id).scrollIntoView({ behavior: 'smooth' });
  }

  // PARTICLE SYSTEM
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  // Create particles
  function initParticles() {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = Math.min(centerX, centerY) * 0.3;

    for (let i = 0; i < 800; i++) {
      const angle = Math.random() * Math.PI * 2;
      const distance = radius * (0.3 + Math.random() * 0.7);

      particles.push({
        x: centerX + Math.cos(angle) * distance,
        y: centerY + Math.sin(angle) * distance,
        vx: (Math.random() - 0.5) * 1,
        vy: (Math.random() - 0.5) * 1,
        size: 1 + Math.random() * 2,
        color: Math.random() > 0.5 ? '#2563eb' : '#ffffff',
        opacity: 0.3 + Math.random() * 0.3
      });
    }
  }

  // Animate
  function animate() {
    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Update particles
    particles.forEach(p => {
      p.vy += 0.03;
      p.vx *= 0.98;
      p.vy *= 0.98;

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      p.x = Math.max(0, Math.min(canvas.width, p.x));
      p.y = Math.max(0, Math.min(canvas.height, p.y));

      // Draw
      ctx.fillStyle = p.color === '#2563eb' 
        ? `rgba(37, 99, 235, ${p.opacity})` 
        : `rgba(255, 255, 255, ${p.opacity})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      if (p.color === '#2563eb') {
        ctx.shadowColor = `rgba(37, 99, 235, ${p.opacity * 0.5})`;
        ctx.shadowBlur = p.size * 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    });

    requestAnimationFrame(animate);
  }

  // Handle resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // Start
  console.log('Initializing particles...');
  initParticles();
  console.log('Particles created:', particles.length);
  animate();
  console.log('Animation started');
  
  // Debug: Show canvas info
  console.log('Canvas size:', canvas.width, 'x', canvas.height);
  console.log('Canvas element:', canvas);
</script>

</body>
</html>
