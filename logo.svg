<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="18" />
  <!-- Inner circle -->
  <circle cx="20" cy="20" r="12" />
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="currentColor" />
  <!-- Top ray -->
  <line x1="20" y1="2" x2="20" y2="8" />
  <!-- Bottom ray -->
  <line x1="20" y1="32" x2="20" y2="38" />
  <!-- Left ray -->
  <line x1="2" y1="20" x2="8" y2="20" />
  <!-- Right ray -->
  <line x1="32" y1="20" x2="38" y2="20" />
</svg>
