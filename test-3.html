<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Labs | Test 3 - Environment Only</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --charcoal: #1a1a1a;
      --dark-gray: #2a2a2a;
      --blue-gray: #3a4a54;
      --white: #ffffff;
      --light-gray: #e8e8e8;
      --graphite: #5a6a7a;
    }

    html, body {
      height: 100%;
      background: #ffffff;
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: transparent;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 48px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 900px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* Visual hierarchy markers - NO TEXT */
    .visual-marker-primary {
      width: 120px;
      height: 2px;
      background: #0066b3;
      opacity: 0.8;
    }

    .visual-marker-secondary {
      width: 200px;
      height: 1px;
      background: #0066b3;
      opacity: 0.4;
    }

    .visual-spacer {
      width: 80px;
      height: 1px;
      background: #ddd;
    }

    /* Design grid - suggests precision/institutional */
    .design-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 32px;
      margin-top: 64px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .grid-item {
      aspect-ratio: 2/3;
      border: 1px solid #e0e0e0;
      background: #fafafa;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }

    .grid-item-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0066b3;
      font-weight: 500;
    }

    .feedback-section {
      margin-top: 120px;
      padding: 48px;
      background: #fafafa;
      border-top: 1px solid #e0e0e0;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .feedback-title {
      font-family: 'EB Garamond', serif;
      font-size: 24px;
      margin-bottom: 24px;
      color: var(--charcoal);
    }

    .feedback-prompt {
      font-size: 14px;
      line-height: 1.8;
      color: var(--graphite);
      margin-bottom: 32px;
      max-width: 520px;
    }

    .feedback-form textarea {
      width: 100%;
      max-width: 520px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 0;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 120px;
    }

    .feedback-form button {
      margin-top: 16px;
      padding: 12px 32px;
      border: 1px solid #0066b3;
      background: transparent;
      color: #0066b3;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .feedback-form button:hover {
      background: #0066b3;
      color: #ffffff;
    }

    @media (max-width: 768px) {
      .hero {
        padding: 60px 20px 50px;
        min-height: auto;
      }

      .hero-visual {
        gap: 32px;
      }

      .design-grid {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 48px;
      }

      .feedback-section {
        padding: 32px 20px;
        margin-top: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-content">
      <div class="nav-logo">AURA LABS</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="#research">Research</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero: Environment Only (No Copy) -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-visual">
        <!-- Top marker -->
        <div class="visual-marker-primary"></div>
        
        <!-- Spacer -->
        <div style="height: 48px;"></div>
        
        <!-- Design grid suggesting product layout -->
        <div class="design-grid">
          <div class="grid-item">
            <div class="grid-item-label">001</div>
          </div>
          <div class="grid-item">
            <div class="grid-item-label">002</div>
          </div>
          <div class="grid-item">
            <div class="grid-item-label">003</div>
          </div>
        </div>
        
        <!-- Bottom marker -->
        <div style="height: 48px;"></div>
        <div class="visual-marker-secondary"></div>
      </div>
    </div>
  </section>

  <!-- Feedback Section -->
  <section class="feedback-section">
    <h2 class="feedback-title">Design Feedback</h2>
    <p class="feedback-prompt">
      You saw the above section with <strong>zero text</strong> — only visual design, spacing, and hierarchy markers. 
      Does it feel institutional, precise, and research-focused? Or does it feel generic and empty?
    </p>
    <form class="feedback-form" onsubmit="submitFeedback(event)">
      <textarea id="feedback-text" placeholder="What's your impression? Does the environment alone communicate 'research institution'?" required></textarea>
      <button type="submit">Submit Feedback</button>
    </form>
  </section>

  <script>
    function submitFeedback(e) {
      e.preventDefault();
      const feedback = document.getElementById('feedback-text').value;
      console.log('Feedback:', feedback);
      alert('Thank you for your feedback. This will help us refine the design.');
      document.getElementById('feedback-text').value = '';
    }
  </script>

  <style>
    .nav-bar {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
      z-index: 100;
      padding: 0;
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--charcoal);
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 32px;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--charcoal);
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #0066b3;
    }

    @media (max-width: 768px) {
      .nav-content {
        padding: 14px 20px;
        flex-direction: column;
        gap: 14px;
      }

      .nav-links {
        gap: 20px;
      }
    }
  </style>
</body>
</html>
